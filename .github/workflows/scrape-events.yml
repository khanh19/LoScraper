name: Scrape nightlife events

on:
  schedule:
    # Monday and Friday at 05:00 ICT (UTC+7) = Sunday/Thursday 22:00 UTC
    - cron: "0 22 * * 0,4"
  workflow_dispatch:
    inputs:
      city:
        description: "City filter (empty = both hcmc and hanoi)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - hcmc
          - hanoi

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper and import to database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          ARGS=(--delay 1.0 --workers 2 --write-db --out events.json)
          if [ -n "${{ github.event.inputs.city }}" ]; then
            ARGS+=(--city "${{ github.event.inputs.city }}")
          fi
          python lo_scrape_club_trending_events.py "${ARGS[@]}"

      - name: Upload scrape artifact
        uses: actions/upload-artifact@v4
        with:
          name: events-json
          path: events.json
          if-no-files-found: error
